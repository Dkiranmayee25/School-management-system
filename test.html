<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABC Public School | Full Responsive Portal</title>
  <style>
    /* ========================================= */
    /* 1. GLOBAL STYLES & RESET                  */
    /* ========================================= */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* Standardizes section spacing across the page */
    section { padding: clamp(60px, 10vh, 100px) 8%; width: 100%; }

    /* ========================================= */
    /* 2. NAVIGATION (Sticky + Mobile Ready)     */
    /* ========================================= */
    .navbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 15px 8%; position: sticky; top: 0; z-index: 1000;
      background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .nav-links { display: flex; list-style: none; gap: 25px; transition: 0.4s; }
    .nav-links a { color: white; text-decoration: none; position: relative; font-weight: 500; }
    .nav-links a::after { content: ""; position: absolute; width: 0; height: 2px; bottom: -4px; left: 0; background: #38bdf8; transition: 0.3s; }
    .nav-links a:hover::after { width: 100%; }

    /* Hamburger UI */
    .hamburger { display: none; cursor: pointer; flex-direction: column; gap: 5px; z-index: 1001; }
    .hamburger span { width: 25px; height: 3px; background: white; transition: 0.3s; }

    /* ========================================= */
    /* 3. SCROLL-TRIGGERED ANIMATION STATES      */
    /* ========================================= */
    .reveal { opacity: 0; transform: translateY(40px); transition: all 0.8s ease-out; }
    .reveal.active { opacity: 1; transform: translateY(0); }

    /* ========================================= */
    /* 4. HERO SECTION (Layout-First)    */
    /* ========================================= */
    .hero { text-align: center; display: flex; flex-direction: column; align-items: center; }
    .hero h1 { font-size: clamp(2rem, 6vw, 3.5rem); margin-bottom: 20px; font-weight: 800; line-height: 1.1; }
    .hero p { font-size: clamp(1rem, 2vw, 1.2rem); max-width: 700px; color: #cbd5e1; margin-bottom: 35px; }

    .btn-primary {
      padding: 14px 35px; border-radius: 50px; background: #38bdf8; color: #0f172a;
      text-decoration: none; font-weight: 700; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn-primary:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 10px 25px rgba(56, 189, 248, 0.4); }

    /* ========================================= */
    /* 5. FOOTER (Sticky)                */
    /* ========================================= */
    footer { margin-top: auto; padding: 40px 8%; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); opacity: 0.7; }

    /* ========================================= */
    /* 6. MOBILE BREAKPOINTS             */
    /* ========================================= */
    @media (max-width: 768px) {
      .hamburger { display: flex; }
      .nav-links {
        position: fixed; right: -100%; top: 0; height: 100vh; width: 80%;
        background: #1e293b; flex-direction: column; justify-content: center; align-items: center;
      }
      .nav-links.active { right: 0; box-shadow: -15px 0 40px rgba(0,0,0,0.5); }
      .hamburger.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
      .hamburger.active span:nth-child(2) { opacity: 0; }
      .hamburger.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }
    }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="logo">ABC Public School</div>
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
    <nav class="nav-links" id="nav-links">
      <a href="#">Home</a><a href="#">About</a><a href="#">Demo</a><a href="#">Contact</a>
    </nav>
  </header>

  <main>
    <section class="hero reveal">
      <h1>Empowering Education for Every Child</h1>
      <p>Discover our comprehensive school management solutions designed to streamline administration, enhance communication, and improve student engagement.</p>
      <a href="#" class="btn-primary">Apply Now</a>
    </section>

    <!-- Additional sections can be added here using the 'reveal' class -->
  </main>

  <footer>&copy; 2024 ABC Public School. All rights reserved.</footer>

  <script>
    // HAMBURGER TOGGLE
    const ham = document.getElementById('hamburger');
    const links = document.getElementById('nav-links');
    ham.onclick = () => { ham.classList.toggle('active'); links.classList.toggle('active'); };

    // SCROLL REVEAL OBSERVER
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('active'); });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>
</body>
</html>
